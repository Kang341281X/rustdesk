name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'flutter/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          brew install cmake ninja nasm pkg-config opus
          brew install --HEAD libyuv || brew install libyuv || true
          # 如果 brew 没有，从源码装到 homebrew 路径
          if ! brew list libyuv &>/dev/null; then
            git clone https://chromium.googlesource.com/libyuv/libyuv.git /tmp/libyuv
            cd /tmp/libyuv
            mkdir build && cd build
            cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/opt/homebrew ..
            make -j$(sysctl -n hw.ncpu)
            sudo make install
            cd $GITHUB_WORKSPACE
          fi

      - name: Flutter pub get
        working-directory: flutter
        run: |
          flutter clean
          flutter pub get

      - name: Build Rust FFI (aarch64)
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: 1
        run: |
          cargo build --features flutter --lib --release --target aarch64-apple-darwin

      - name: Build Rust FFI (x86_64)
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: 1
        run: |
          cargo build --features flutter --lib --release --target x86_64-apple-darwin

      - name: Create Universal Binary
        run: |
          mkdir -p target/universal/release
          lipo -create \
            target/x86_64-apple-darwin/release/librustdesk.dylib \
            target/aarch64-apple-darwin/release/librustdesk.dylib \
            -output target/universal/release/librustdesk.dylib

      - name: Copy dylib to Flutter
        run: |
          mkdir -p flutter/macos/Libs
          cp target/universal/release/librustdesk.dylib flutter/macos/Libs/

      - name: Build Flutter macOS
        working-directory: flutter
        run: |
          flutter build macos --release \
            --dart-define=PILOTX_ROLE=controller \
            --dart-define=PILOTX_LICENSE_API=https://yishengyuzhou.asia/pilotx-admin

      - name: Sign and package DMG
        run: |
          APP_BUNDLE="flutter/build/macos/Build/Products/Release/PilotX.app"
          codesign --deep --force --sign "-" "$APP_BUNDLE"
          mkdir -p dist
          hdiutil create \
            -volname "PilotX" \
            -srcfolder "$APP_BUNDLE" \
            -ov -format UDZO \
            dist/PilotX-controller-mac.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PilotX-mac-dmg
          path: dist/*.dmg
          retention-days: 30