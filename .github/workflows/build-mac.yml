$content = @'
name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'flutter/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          brew install cmake ninja nasm

      - name: Flutter pub get
        working-directory: flutter
        run: |
          flutter clean
          flutter pub get

      - name: Build Rust FFI
        run: |
          cargo build --features flutter --lib --release --target x86_64-apple-darwin
          cargo build --features flutter --lib --release --target aarch64-apple-darwin
          mkdir -p target/universal/release
          lipo -create \
            target/x86_64-apple-darwin/release/librustdesk.dylib \
            target/aarch64-apple-darwin/release/librustdesk.dylib \
            -output target/universal/release/librustdesk.dylib

      - name: Copy dylib to Flutter
        run: |
          mkdir -p flutter/macos/Libs
          cp target/universal/release/librustdesk.dylib flutter/macos/Libs/

      - name: Build Flutter macOS
        working-directory: flutter
        run: |
          flutter build macos --release \
            --dart-define=PILOTX_ROLE=controller \
            --dart-define=PILOTX_LICENSE_API=https://yishengyuzhou.asia/pilotx-admin

      - name: Sign and package DMG
        run: |
          APP_BUNDLE="flutter/build/macos/Build/Products/Release/PilotX.app"
          codesign --deep --force --sign "-" "$APP_BUNDLE"
          mkdir -p dist
          hdiutil create \
            -volname "PilotX" \
            -srcfolder "$APP_BUNDLE" \
            -ov -format UDZO \
            dist/PilotX-controller-mac.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PilotX-mac-dmg
          path: dist/*.dmg
          retention-days: 30
'@

# 用 UTF-8 无 BOM 格式写入
[System.IO.File]::WriteAllText(
  'D:\MyProject\rustdesk-mac\.github\workflows\build-mac.yml',
  $content,
  [System.Text.UTF8Encoding]::new($false)
)

Write-Host "文件写入完成"